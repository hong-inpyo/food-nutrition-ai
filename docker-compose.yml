services:

  backend:
    build: .
    command: uvicorn fastapi_app:app --host 0.0.0.0 --port 8000

    ports:
      - "8000:8000"

    volumes:
      - .:/app

  frontend:
    build: .

    command: streamlit run streamlit_app.py --server.address 0.0.0.0 --server.port 8501

    ports:
      - "8501:8501"

    volumes:
      - .:/app

    depends_on:
      - backend